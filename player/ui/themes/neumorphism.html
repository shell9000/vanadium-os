<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanadium OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--bg4:#242424;
  --gold:#b8975a;--gold2:#d4b06a;--white:#f0ece4;--dim:#777;--dim2:#444;
  --green:#4caf72;--red:#e05555;--border:#2a2a2a;
  --radius:10px;
}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;overflow:hidden}
.app{display:flex;height:100vh}

/* ── Sidebar ── */
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:1.4rem 1.2rem;display:flex;align-items:center;gap:.7rem;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px}
.logo-text{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500}
.nav{padding:.8rem 0}
.nav-btn{width:100%;display:flex;align-items:center;gap:.8rem;padding:.7rem 1.2rem;background:none;border:none;color:var(--dim);font-size:.85rem;cursor:pointer;transition:.2s;border-left:2px solid transparent;font-family:inherit}
.nav-btn:hover{color:var(--white);background:var(--bg3)}
.nav-btn.active{color:var(--gold);border-left-color:var(--gold);background:rgba(184,151,90,.08)}
.nav-btn svg{width:17px;height:17px;flex-shrink:0}
.sidebar-section{padding:.4rem 1.2rem;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim2);margin-top:.8rem}
.queue-scroll{flex:1;overflow-y:auto}
.queue-scroll::-webkit-scrollbar{width:3px}
.queue-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.q-item{display:flex;align-items:center;gap:.7rem;padding:.55rem 1.2rem;cursor:pointer;transition:.15s}
.q-item:hover{background:var(--bg3)}
.q-item.active{background:rgba(184,151,90,.1)}
.q-num{width:18px;font-size:.7rem;color:var(--dim2);text-align:center;flex-shrink:0}
.q-info{flex:1;overflow:hidden}
.q-title{font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-artist{font-size:.7rem;color:var(--dim)}
.q-dur{font-size:.7rem;color:var(--dim2);flex-shrink:0}

/* ── Content ── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Player View ── */
.player-view{flex:1;display:flex;overflow:hidden}
.now-playing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem;position:relative;overflow:hidden}
.bg-art{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(80px) brightness(.25) saturate(1.5);transform:scale(1.3);transition:background-image .8s;z-index:0}
.cover-container{position:relative;z-index:1;margin-bottom:1.8rem}
.cover-art{width:280px;height:280px;border-radius:16px;object-fit:cover;box-shadow:0 24px 80px rgba(0,0,0,.8);background:var(--bg3);display:flex;align-items:center;justify-content:center}
.cover-art img{width:100%;height:100%;border-radius:16px;object-fit:cover}
.cover-placeholder{color:var(--dim2)}
.cover-placeholder svg{width:72px;height:72px}
.track-meta{position:relative;z-index:1;text-align:center;max-width:400px}
.track-title{font-size:1.3rem;font-weight:600;margin-bottom:.35rem;line-height:1.3}
.track-artist{font-size:.95rem;color:var(--gold);margin-bottom:.2rem}
.track-album{font-size:.8rem;color:var(--dim)}

/* Library Panel */
.lib-panel{width:360px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column}
.lib-panel.hidden{display:none}
.panel-head{padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem}
.panel-head h3{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);flex:1}
.search-box{padding:.6rem 1.2rem;border-bottom:1px solid var(--border)}
.search-box input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.45rem .75rem;color:var(--white);font-size:.82rem;outline:none;font-family:inherit}
.search-box input:focus{border-color:var(--gold)}
.search-box input::placeholder{color:var(--dim2)}
.lib-list{flex:1;overflow-y:auto}
.lib-list::-webkit-scrollbar{width:3px}
.lib-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.lib-item{display:flex;align-items:center;gap:.7rem;padding:.6rem 1.2rem;cursor:pointer;transition:.15s;border-bottom:1px solid rgba(255,255,255,.02)}
.lib-item:hover{background:var(--bg3)}
.lib-icon{width:32px;height:32px;background:var(--bg4);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--dim)}
.lib-icon svg{width:16px;height:16px}
.lib-info{flex:1;overflow:hidden}
.lib-name{font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-sub{font-size:.72rem;color:var(--dim)}

/* ── Player Bar ── */
.player-bar{background:var(--bg2);border-top:1px solid var(--border);padding:.8rem 1.5rem;display:flex;flex-direction:column;gap:.6rem;flex-shrink:0}
.progress-row{display:flex;align-items:center;gap:.7rem}
.time-label{font-size:.72rem;color:var(--dim);width:36px;flex-shrink:0}
.time-label.r{text-align:right}
.progress-track{flex:1;height:3px;background:var(--bg4);border-radius:2px;cursor:pointer;position:relative}
.progress-track:hover{height:5px;margin:-1px 0}
.progress-fill{height:100%;background:var(--gold);border-radius:2px}
.controls-row{display:flex;align-items:center}
.ctrl-left{display:flex;align-items:center;gap:.5rem;flex:1}
.ctrl-center{display:flex;align-items:center;gap:.8rem}
.ctrl-right{display:flex;align-items:center;gap:.5rem;flex:1;justify-content:flex-end}
.cbtn{background:none;border:none;color:var(--dim);cursor:pointer;padding:.35rem;border-radius:6px;transition:.2s;display:flex;align-items:center;justify-content:center}
.cbtn:hover{color:var(--white)}
.cbtn.on{color:var(--gold)}
.cbtn svg{width:18px;height:18px}
.cbtn-main{background:var(--gold);color:#000;width:40px;height:40px;border-radius:50%;padding:0}
.cbtn-main:hover{background:var(--gold2);color:#000;transform:scale(1.05)}
.cbtn-main svg{width:20px;height:20px}
.cbtn-lg svg{width:22px;height:22px}
.mini-cover{width:38px;height:38px;border-radius:6px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.mini-info .t{font-size:.8rem;font-weight:500}
.mini-info .a{font-size:.72rem;color:var(--dim)}
.vol-row{display:flex;align-items:center;gap:.4rem}
.vol-slider{width:72px;height:3px;appearance:none;background:var(--bg4);border-radius:2px;cursor:pointer;outline:none}
.vol-slider::-webkit-slider-thumb{appearance:none;width:11px;height:11px;background:var(--gold);border-radius:50%;cursor:pointer}

/* ── Settings View ── */
.settings-view{flex:1;overflow-y:auto;padding:2rem;display:none}
.settings-view.active{display:block}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;max-width:900px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.card-title{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem}
.card-title svg{width:15px;height:15px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.stat-item .label{font-size:.72rem;color:var(--dim);margin-bottom:.3rem}
.stat-item .value{font-size:1.4rem;font-weight:600;color:var(--gold)}
.stat-item .unit{font-size:.75rem;color:var(--dim)}
.svc-list{display:flex;flex-direction:column;gap:.8rem}
.svc-item{display:flex;align-items:center;gap:.8rem;padding:.8rem;background:var(--bg3);border-radius:8px}
.svc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.svc-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.svc-dot.off{background:var(--dim2)}
.svc-name{flex:1;font-size:.85rem}
.svc-status{font-size:.72rem;color:var(--dim)}
.toggle-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;font-size:.72rem;color:var(--dim);cursor:pointer;transition:.2s;font-family:inherit}
.toggle-btn:hover{border-color:var(--gold);color:var(--gold)}
.toggle-btn.stop{border-color:var(--red);color:var(--red)}
.disk-list{display:flex;flex-direction:column;gap:.6rem}
.disk-item{padding:.8rem;background:var(--bg3);border-radius:8px}
.disk-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.disk-dev{font-size:.8rem;font-weight:500}
.disk-mp{font-size:.72rem;color:var(--dim)}
.disk-bar{height:3px;background:var(--bg4);border-radius:2px}
.disk-bar-fill{height:100%;background:var(--gold);border-radius:2px}
.disk-info{display:flex;justify-content:space-between;margin-top:.3rem;font-size:.7rem;color:var(--dim)}
.full-width{grid-column:1/-1}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="15" stroke="#b8975a" stroke-width="1.2"/>
      <circle cx="16" cy="16" r="8" stroke="#b8975a" stroke-width="1" opacity=".4"/>
      <circle cx="16" cy="16" r="2.5" fill="#b8975a"/>
    </svg>
    <span class="logo-text">Vanadium OS</span>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="setView('player')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>正在播放
    </button>
    <button class="nav-btn" onclick="setView('library')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>音樂庫
    </button>
    <button class="nav-btn" onclick="setView('settings')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54A.484.484 0 0 0 14 2h-3.84a.484.484 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L3.8 8.27a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.27.41.49.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 onclick="switchSidebar('library')">音樂庫</div>
        </div>
        <div class="search-wrap" id="searchWrap" style="display:none">
          <input class="search-input" type="text" placeholder="搜索..." id="searchInput" oninput="doSearch(this.value)">
        </div>
        <div id="breadcrumbWrap" style="display:none"></div>
        <div class="sidebar-list" id="sidebarList"></div>
      </div>

      <!-- Now Playing -->
      <div class="now-playing">
        <div class="np-bg" id="npBg"></div>
        <div class="np-content">
          <div class="cover-container" id="coverContainer">
            <div class="cover-placeholder"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg></div>
          </div>
          <div class="np-info">
            <div class="np-title" id="npTitle">未選擇歌曲</div>
            <div class="np-artist" id="npArtist">—</div>
            <div class="np-album" id="npAlbum"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings View -->
    <div class="settings-view" id="settingsView">

      <!-- System Stats -->
      <div class="settings-section">
        <div class="ss-header">系統狀態</div>
        <div class="ss-body">
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">CPU 使用率</div><div class="stat-value" id="sCpu">—</div></div>
            <div class="stat-card"><div class="stat-label">記憶體使用率</div><div class="stat-value" id="sMem">—</div></div>
          </div>
        </div>
      </div>

      <!-- Services -->
      <div class="settings-section">
        <div class="ss-header">服務管理</div>
        <div class="ss-body" id="servicesBody">
          <div class="service-row" id="svc-mpd">
            <div class="svc-info"><div class="svc-dot" id="dot-mpd"></div><div><div class="svc-name">MPD</div><div class="svc-desc">Music Player Daemon</div></div></div>
            <button class="svc-toggle" id="btn-mpd" onclick="toggleService('mpd')">—</button>
          </div>
          <div class="service-row" id="svc-roon">
            <div class="svc-info"><div class="svc-dot" id="dot-roon"></div><div><div class="svc-name">Roon Bridge</div><div class="svc-desc">Roon 音樂串流</div></div></div>
            <button class="svc-toggle" id="btn-roon" onclick="toggleService('roon')">—</button>
          </div>
          <div class="service-row" id="svc-diretta">
            <div class="svc-info"><div class="svc-dot" id="dot-diretta"></div><div><div class="svc-name">Diretta</div><div class="svc-desc">Diretta Host</div></div></div>
            <button class="svc-toggle" id="btn-diretta" onclick="toggleService('diretta')">—</button>
          </div>
          <div class="service-row" id="svc-naa">
            <div class="svc-info"><div class="svc-dot" id="dot-naa"></div><div><div class="svc-name">NAA</div><div class="svc-desc">Network Audio Adapter</div></div></div>
            <button class="svc-toggle" id="btn-naa" onclick="toggleService('naa')">—</button>
          </div>
        </div>
      </div>

      <!-- Disks -->
      <div class="settings-section">
        <div class="ss-header">儲存裝置</div>
        <div class="ss-body" id="disksBody"><div style="color:var(--dim);font-size:0.85rem;">載入中...</div></div>
      </div>

    </div>
  </div>

  <!-- Player Bar -->
  <div class="player-bar">
    <div class="progress-row">
      <span class="ptime" id="ptimeElapsed">0:00</span>
      <div class="pbar" id="pbar" onclick="seekTo(event)">
        <div class="pbar-fill" id="pbarFill" style="width:0%"></div>
      </div>
      <span class="ptime r" id="ptimeDuration">0:00</span>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-left">
        <img class="mini-art" id="miniArt" src="" style="display:none" onerror="this.style.display='none'">
        <div class="mini-info">
          <div class="mini-t" id="miniTitle">—</div>
          <div class="mini-a" id="miniArtist"></div>
        </div>
      </div>
      <div class="ctrl-center">
        <button class="cbtn" id="btnRandom" onclick="toggleRandom()" title="隨機">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="cbtn cbtn-lg" onclick="apiCall('POST','/prev')" title="上一首">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="cbtn cbtn-play" id="btnPlay" onclick="togglePlay()">
          <svg id="icoPlay" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icoPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="cbtn cbtn-lg" onclick="apiCall('POST','/next')" title="下一首">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg>
        </button>
        <button class="cbtn" id="btnRepeat" onclick="toggleRepeat()" title="重複">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
      </div>
      <div class="ctrl-right">
        <button class="cbtn" onclick="toggleMute()" title="靜音">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
        <div class="vol-wrap">
          <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="50" oninput="setVolume(this.value)">
        </div>
      </div>
    </div>
  </div>

</div>
<script>
const API='http://192.168.0.220:8080/api';
let state={playing:false,elapsed:0,duration:0,volume:50,repeat:false,random:false,title:'',artist:'',album:'',file:''};
let libPath=[];let muted=false;let lastVol=50;let sidebarMode='queue';

async function apiCall(method,path,body){
  try{
    const r=await fetch(API+path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
    return await r.json();
  }catch(e){return null;}
}

function fmt(s){s=Math.floor(s||0);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

async function refreshStatus(){
  const s=await apiCall('GET','/status');if(!s)return;
  state={...state,...s};
  const playing=s.state==='play';
  document.getElementById('icoPlay').style.display=playing?'none':'block';
  document.getElementById('icoPause').style.display=playing?'block':'none';
  document.getElementById('npTitle').textContent=s.title||'未選擇歌曲';
  document.getElementById('npArtist').textContent=s.artist||'—';
  document.getElementById('npAlbum').textContent=s.album||'';
  document.getElementById('miniTitle').textContent=s.title||'—';
  document.getElementById('miniArtist').textContent=s.artist||'';
  const pct=s.duration>0?(s.elapsed/s.duration*100):0;
  document.getElementById('pbarFill').style.width=Math.min(pct,100)+'%';
  document.getElementById('ptimeElapsed').textContent=fmt(s.elapsed);
  document.getElementById('ptimeDuration').textContent=fmt(s.duration);
  document.getElementById('volSlider').value=s.volume;
  document.getElementById('btnRepeat').classList.toggle('active',s.repeat);
  document.getElementById('btnRandom').classList.toggle('active',s.random);
  if(s.file){
    const dir=s.file.split('/').slice(0,-1).join('/');
    const cu=API+'/cover?path='+encodeURIComponent(dir);
    document.getElementById('npBg').style.backgroundImage=`url('${cu}')`;
    document.getElementById('coverContainer').innerHTML=`<img src="${cu}" onerror="this.parentElement.innerHTML='<div class=cover-placeholder><svg viewBox=\'0 0 24 24\' fill=\'currentColor\'><path d=\'M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z\'/></svg></div>'"`;
    const ma=document.getElementById('miniArt');ma.src=cu;ma.style.display='block';
  }
}

async function togglePlay(){
  const s=await apiCall('GET','/status');
  if(s&&s.state==='play')await apiCall('POST','/pause');else await apiCall('POST','/play');
  setTimeout(refreshStatus,200);
}
async function toggleRepeat(){await apiCall('POST','/repeat');setTimeout(refreshStatus,200);}
async function toggleRandom(){await apiCall('POST','/random');setTimeout(refreshStatus,200);}
async function setVolume(v){await apiCall('POST','/volume',{volume:parseInt(v)});}
function toggleMute(){const sl=document.getElementById('volSlider');if(muted){sl.value=lastVol;setVolume(lastVol);muted=false;}else{lastVol=sl.value;sl.value=0;setVolume(0);muted=true;}}
async function seekTo(e){const b=document.getElementById('pbar');const pct=e.offsetX/b.offsetWidth;await apiCall('POST','/seek',{position:pct*state.duration});setTimeout(refreshStatus,200);}

function switchView(v){
  document.getElementById('playerView').style.display=v==='player'?'flex':'none';
  document.getElementById('settingsView').classList.toggle('active',v==='settings');
  document.getElementById('tabPlayer').classList.toggle('active',v==='player');
  document.getElementById('tabSettings').classList.toggle('active',v==='settings');
  if(v==='settings')loadSettings();
}

function switchSidebar(mode){
  sidebarMode=mode;
  document.getElementById('stabQueue').classList.toggle('active',mode==='queue');
  document.getElementById('stabLibrary').classList.toggle('active',mode==='library');
  document.getElementById('searchWrap').style.display=mode==='library'?'block':'none';
  document.getElementById('breadcrumbWrap').style.display=mode==='library'&&libPath.length?'block':'none';
  if(mode==='queue')loadQueue();else{libPath=[];loadLibrary('');}
}

async function loadQueue(){
  const r=await apiCall('GET','/queue');if(!r)return;
  const list=document.getElementById('sidebarList');list.innerHTML='';
  r.queue.forEach((item,i)=>{
    const div=document.createElement('div');div.className='slist-item'+(item.file===state.file?' playing':'');
    const name=item.title||item.file.split('/').pop();
    const dur=item.time?fmt(parseInt(item.time)):'';

async function api(method,path,body){
  try{
    const r=await fetch(API+path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
    return await r.json();
  }catch(e){return null;}
}

function fmt(s){s=Math.floor(s||0);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

function coverUrl(file){
  if(!file) return '';
  const dir=file.split('/').slice(0,-1).join('/');
  return API+'/cover?path='+encodeURIComponent(dir);
}

async function refresh(){
  const s=await api('GET','/status');
  if(!s) return;
  st={...st,...s};
  const playing=s.state==='play';
  document.getElementById('iPlay').style.display=playing?'none':'block';
  document.getElementById('iPause').style.display=playing?'block':'none';
  document.getElementById('trackTitle').textContent=s.title||'未選擇歌曲';
  document.getElementById('trackArtist').textContent=s.artist||'—';
  document.getElementById('trackAlbum').textContent=s.album||'';
  document.getElementById('miniTitle').textContent=s.title||'—';
  document.getElementById('miniArtist').textContent=s.artist||'';
  const pct=s.duration>0?(s.elapsed/s.duration*100):0;
  document.getElementById('progressFill').style.width=Math.min(pct,100)+'%';
  document.getElementById('elapsed').textContent=fmt(s.elapsed);
  document.getElementById('duration').textContent=fmt(s.duration);
  document.getElementById('volSlider').value=s.volume;
  document.getElementById('btnRepeat').classList.toggle('on',s.repeat);
  document.getElementById('btnRandom').classList.toggle('on',s.random);
  if(s.file){
    const cu=coverUrl(s.file);
    document.getElementById('bgArt').style.backgroundImage=`url('${cu}')`;
    document.getElementById('coverArt').innerHTML=`<img src="${cu}" onerror="this.parentElement.innerHTML='<div class=cover-placeholder><svg viewBox=\'0 0 24 24\' fill=\'currentColor\'><path d=\'M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z\'/></svg></div>'">`;
    const mc=document.getElementById('miniCover');
    mc.src=cu; mc.style.display='block';
    mc.onerror=()=>mc.style.display='none';
  }
  // update queue active
  document.querySelectorAll('.q-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.file===s.file);
  });
}

  const s=await api('GET','/status');
  if(s&&s.state==='play') await api('POST','/pause');
  else await api('POST','/play');
  setTimeout(refresh,200);
}

async function loadSettings(){
  // System stats
  const sys=await apiCall('GET','/system');
  if(sys){
    document.getElementById('sCpu').textContent=sys.cpu_percent.toFixed(1)+' %';
    const memPct=(sys.memory_used/sys.memory_total*100).toFixed(1);
    document.getElementById('sMem').textContent=memPct+' %';
  }
  // Services
  const svcs=[
    {id:'mpd',name:'mpd'},
    {id:'roon',name:'roonserver'},
    {id:'diretta',name:'diretta-alsa'},
    {id:'naa',name:'networkaudiod'}
  ];
  for(const svc of svcs){
    try{
      const r=await fetch('http://192.168.0.220:8080/api/service/status?name='+svc.id);
      const d=await r.json();
      const running=d.running;
      const dot=document.getElementById('dot-'+svc.id);
      const btn=document.getElementById('btn-'+svc.id);
      if(dot){dot.className='svc-dot '+( running?'running':'stopped');}
      if(btn){btn.textContent=running?'停止':'啟動';btn.className='svc-toggle '+( running?'stop':'start');}
    }catch(e){}
  }
  // Disks
  const disks=await apiCall('GET','/mounts');
  if(disks&&disks.mounts){
    const body=document.getElementById('disksBody');body.innerHTML='' ;
    disks.mounts.filter(m=>m.total&&m.total>1e8).forEach(m=>{
      const pct=(m.used/m.total*100).toFixed(1);
      const gb=v=>( v/1e9).toFixed(1)+' GB';
      const div=document.createElement('div');div.className='disk-row';
      div.innerHTML=`<div class="disk-info"><div class="disk-name">${m.mountpoint}</div><div class="disk-meta">${m.device} · ${m.fstype} · ${gb(m.free)} 可用</div></div><div class="disk-bar-wrap"><div style="font-size:0.75rem;color:var(--dim);text-align:right">${pct}%</div><div class="disk-bar"><div class="disk-bar-fill" style="width:${pct}%"></div></div></div>`;
      body.appendChild(div);
    });
    if(!body.children.length)body.innerHTML='<div style="color:var(--dim);font-size:0.85rem;">未找到儲存裝置</div>';
  }
}

  const action=btn.classList.contains('stop')?' stop':'start';
  await apiCall('POST','/service/toggle',{name:id,action:action.trim()});

  sv.style.display=v==='settings'?'block':'none';

  backBtn.style.display=libStack.length>0?'flex':'none';
  document.getElementById('panelTitle').textContent=path?path.split('/').pop():'音樂庫';

    const div=document.createElement('div');
    div.className='lib-item';
    if(item.directory){
      div.innerHTML=`<div class="lib-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></div><div class="lib-info"><div class="lib-name">${item.directory.split('/').pop()}</div><div class="lib-sub">資料夾</div></div>`;

      const div=document.createElement('div');
      div.className='disk-item';
      div.innerHTML=`<div class="disk-head"><span class="disk-dev">${m.device}</span><span class="disk-mp">${m.mountpoint}</span></div><div class="disk-bar"><div class="disk-bar-fill" style="width:${pct}%"></div></div><div class="disk-info"><span>${used} / ${total}</span><span>${pct}%</span></div>`;
      list.appendChild(div);
    });
  }
}

function fmt2(bytes){
  if(bytes>1e12) return (bytes/1e12).toFixed(1)+'TB';
  if(bytes>1e9) return (bytes/1e9).toFixed(1)+'GB';
  return (bytes/1e6).toFixed(0)+'MB';
}

function updateSvcUI(svc,active){
  const dot=document.getElementById('dot-'+svc);
  const status=document.getElementById('status-'+svc);
  const btn=document.getElementById('btn-'+svc);
  if(!dot) return;
  dot.className='svc-dot '+(active?'on':'off');
  status.textContent=active?'運行中':'已停止';
  btn.textContent=active?'停止':'啟動';
  btn.className='toggle-btn'+(active?' stop':'');
}

async function toggleSvc(svc){
  const dot=document.getElementById('dot-'+svc);
  const active=dot.classList.contains('on');
  const action=active?'stop':'start';
  const r=await api('POST','/service/toggle',{name:svc,action});
  if(r) updateSvcUI(svc,!active);
}

// Init
refresh();
loadQueue();
setInterval(refresh,2000);
setInterval(loadQueue,10000);
</script></body></html>
